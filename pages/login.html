<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — BatchRender</title>
  <link rel="icon" type="image/png" href="../img/logo.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="login">

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">
      <img src="../img/logo.png" alt="BatchRender Logo">
    </a>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="zh">中文</button>
      </div>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="../img/logo.png" alt="BatchRender">
    </div>
    <h1 class="auth-title" id="login-title">Welcome back</h1>
    <p class="auth-sub" id="login-sub">Sign in to your BatchRender account</p>

    <form class="form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" id="l-email">Email address</label>
        <input type="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          <span id="l-password">Password</span>
          <a href="forgot.html" id="l-forgot" style="color:var(--blue-light);font-size:0.8rem">Forgot password?</a>
        </label>
        <input type="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        <span id="l-submit">Sign In</span>
      </button>
    </form>

    <p class="auth-link" id="l-register-text">Don't have an account? <a href="register.html" id="l-register-link">Sign up free</a></p>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
const loginT = {
  en: { title:'Welcome back', sub:'Sign in to your BatchRender account', email:'Email address', password:'Password', forgot:'Forgot password?', submit:'Sign In', regText:"Don't have an account?", regLink:'Sign up free' },
  ru: { title:'С возвращением', sub:'Войдите в аккаунт BatchRender', email:'Email адрес', password:'Пароль', forgot:'Забыли пароль?', submit:'Войти', regText:'Нет аккаунта?', regLink:'Зарегистрируйтесь' },
  zh: { title:'欢迎回来', sub:'登录您的BatchRender账户', email:'电子邮件地址', password:'密码', forgot:'忘记密码？', submit:'登录', regText:'没有账户？', regLink:'免费注册' }
};
function renderPage() {
  const t = loginT[lang];
  document.getElementById('login-title').textContent = t.title;
  document.getElementById('login-sub').textContent = t.sub;
  document.getElementById('l-email').textContent = t.email;
  document.getElementById('l-password').textContent = t.password;
  document.getElementById('l-forgot').textContent = t.forgot;
  document.getElementById('l-submit').textContent = t.submit;
  document.getElementById('l-register-text').innerHTML = t.regText + ' <a href="register.html">' + t.regLink + '</a>';
}
function handleLogin(e) {
  e.preventDefault();
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
