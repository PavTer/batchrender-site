<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BatchRender CMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="cms-config-url" type="application/json" href="/admin/config.yml">
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    CMS.init({ config: {
      backend: {
        name: 'github',
        repo: 'PavTer/batchrender-site',
        branch: 'main',
        base_url: 'https://batchrender-oauth.vercel.app'
      },
      media_folder: 'img',
      public_folder: '/img',
      collections: [
        {
          name: 'pages',
          label: 'Pages',
          folder: 'img',
          create: false,
          fields: [
            { name: 'title', label: 'Title', widget: 'string' }
          ]
        }
      ]
    }});
  </script>
</body>
</html>
