backend:
  name: github
  repo: PavTer/batchrender-site
  branch: main
  base_url: https://batchrender-oauth.vercel.app

media_folder: "img"
public_folder: "/img"

locale: "en"

collections:

  # ── IMAGES ──────────────────────────────────────────────────────────────────
  - name: "media"
    label: "🖼 Images & Media"
    folder: "img"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Alt text", name: "alt", widget: "string", required: false }

  # ── SITE CONTENT ────────────────────────────────────────────────────────────
  - name: "site"
    label: "📝 Site Content"
    files:

      # ── ENGLISH ─────────────────────────────────────────────────────────────
      - file: "content.json"
        name: "en"
        label: "🇬🇧 English Content"
        format: "json"
        fields:
          - label: "EN"
            name: "en"
            widget: "object"
            fields:

              - label: "Navigation"
                name: "nav"
                widget: "object"
                fields:
                  - { label: "Features", name: "features", widget: "string" }
                  - { label: "Pricing", name: "pricing", widget: "string" }
                  - { label: "Tutorials", name: "tutorials", widget: "string" }
                  - { label: "Docs", name: "docs", widget: "string" }
                  - { label: "Contact", name: "contact", widget: "string" }
                  - { label: "Login", name: "login", widget: "string" }
                  - { label: "Sign Up", name: "signup", widget: "string" }

              - label: "Hero Section"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Badge", name: "badge", widget: "string" }
                  - { label: "Title Line 1", name: "title1", widget: "string" }
                  - { label: "Title Line 2", name: "title2", widget: "string" }
                  - { label: "Title Line 3", name: "title3", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "CTA Button 1", name: "cta1", widget: "string" }
                  - { label: "CTA Button 2", name: "cta2", widget: "string" }
                  - { label: "Stat 1 Number", name: "stat1n", widget: "string" }
                  - { label: "Stat 1 Label", name: "stat1l", widget: "string" }
                  - { label: "Stat 2 Number", name: "stat2n", widget: "string" }
                  - { label: "Stat 2 Label", name: "stat2l", widget: "string" }
                  - { label: "Stat 3 Number", name: "stat3n", widget: "string" }
                  - { label: "Stat 3 Label", name: "stat3l", widget: "string" }

              - label: "Features Section"
                name: "features"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "sub", widget: "text" }
                  - label: "Feature Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Icon (emoji)", name: "icon", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "desc", widget: "text" }

              - label: "How It Works"
                name: "how"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Steps"
                    name: "steps"
                    widget: "list"
                    fields:
                      - { label: "Step Title", name: "title", widget: "string" }
                      - { label: "Step Description", name: "desc", widget: "text" }

              - label: "Pricing Section"
                name: "pricing"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "sub", widget: "text" }
                  - { label: "Note (guarantee)", name: "note", widget: "string" }
                  - label: "Plans"
                    name: "plans"
                    widget: "list"
                    fields:
                      - { label: "Plan Name", name: "name", widget: "string" }
                      - { label: "Price (number only)", name: "price", widget: "string" }
                      - { label: "Currency", name: "currency", widget: "string" }
                      - { label: "Period", name: "period", widget: "string" }
                      - { label: "Most Popular?", name: "popular", widget: "boolean", default: false }
                      - { label: "Description", name: "desc", widget: "text" }
                      - { label: "Features (one per line)", name: "features", widget: "list", field: { label: "Feature", name: "feature", widget: "string" } }
                      - { label: "Missing features (one per line)", name: "missing", widget: "list", field: { label: "Feature", name: "feature", widget: "string" } }
                      - { label: "CTA Button", name: "cta", widget: "string" }

              - label: "Tutorials Section"
                name: "tutorials"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "sub", widget: "text" }
                  - label: "Tutorial Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Duration", name: "dur", widget: "string" }
                      - { label: "Level", name: "level", widget: "string" }

              - label: "Testimonials"
                name: "testimonials"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Reviews"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Quote", name: "text", widget: "text" }
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Role", name: "role", widget: "string" }
                      - { label: "Initials", name: "init", widget: "string" }

              - label: "FAQ"
                name: "faq"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Question", name: "q", widget: "string" }
                      - { label: "Answer", name: "a", widget: "text" }

              - label: "Contact Section"
                name: "contact"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "sub", widget: "text" }
                  - label: "Contact Info Items"
                    name: "info"
                    widget: "list"
                    fields:
                      - { label: "Icon", name: "icon", widget: "string" }
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Value", name: "value", widget: "string" }
                  - label: "Contact Form"
                    name: "form"
                    widget: "object"
                    fields:
                      - { label: "Name placeholder", name: "name", widget: "string" }
                      - { label: "Email placeholder", name: "email", widget: "string" }
                      - { label: "Subject placeholder", name: "subject", widget: "string" }
                      - { label: "Subject options", name: "subjects", widget: "list", field: { label: "Option", name: "option", widget: "string" } }
                      - { label: "Message placeholder", name: "message", widget: "string" }
                      - { label: "Send button", name: "send", widget: "string" }
                      - { label: "Success message", name: "success", widget: "string" }

              - label: "CTA Banner"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "sub", widget: "text" }
                  - { label: "Button 1", name: "btn1", widget: "string" }
                  - { label: "Button 2", name: "btn2", widget: "string" }

              - label: "Footer"
                name: "footer"
                widget: "object"
                fields:
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Product links", name: "product", widget: "list", field: { label: "Link", name: "link", widget: "string" } }
                  - { label: "Support links", name: "support", widget: "list", field: { label: "Link", name: "link", widget: "string" } }
                  - { label: "Legal links", name: "legal", widget: "list", field: { label: "Link", name: "link", widget: "string" } }
                  - { label: "Copyright", name: "rights", widget: "string" }

